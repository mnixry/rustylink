/api/tpslogin/link:
  get:
    operationId: getThirdPartyLoginLinks
    parameters:
      - name: code_challenge
        in: query
        required: true
        schema: { type: string }
    responses:
      "200":
        description: The request has succeeded.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetThirdPartyLoginLinksResponse"

/api/tpslogin/callback/{alias}:
  get:
    operationId: oauthCallback
    parameters:
      - name: alias
        in: path
        required: true
        schema: { type: string }
      - name: code
        in: query
        required: true
        schema: { type: string }
      - name: state
        in: query
        required: true
        schema: { type: string }
    responses:
      "200":
        description: The request has succeeded.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OauthCallbackResponse"

