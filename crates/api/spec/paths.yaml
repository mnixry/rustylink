    operationId: loginByPassword
    parameters: &device_query
      - $ref: "#/components/parameters/Os"
      - $ref: "#/components/parameters/OsVersion"
      - $ref: "#/components/parameters/AppVersion"
      - $ref: "#/components/parameters/Brand"
      - $ref: "#/components/parameters/Model"
      - $ref: "#/components/parameters/Did"
      - $ref: "#/components/parameters/BuildNumber"
      - $ref: "#/components/parameters/OsVersionPatch"
      - $ref: "#/components/parameters/Timestamp"
      - $ref: "#/components/parameters/ClientSource"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PasswordLoginRequest"
    responses:
      "200":
        description: The request has succeeded.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginByPasswordResponse"

