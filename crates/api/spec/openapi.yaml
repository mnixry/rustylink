openapi: 3.0.3
info:
  title: Rustylink static-evidence API
  version: 0.1.0
servers:
  - url: "{baseUrl}"
    variables:
      baseUrl:
        default: "https://example.invalid"
paths:
  /api/match:
    post:
      operationId: activate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateRequest"
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateResponse"
  /api/login:
    post:
      operationId: loginByPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordLoginRequest"
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginByPasswordResponse"
  /api/login/code/send:
    post:
      operationId: sendLoginCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendCodeRequest"
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendLoginCodeResponse"
  /api/login/code/verify:
    post:
      operationId: verifyLoginCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCodeRequest"
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyLoginCodeResponse"
  /api/mfa/code/verify:
    post:
      operationId: verifyMfa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyMfaRequest"
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyMfaResponse"
  /api/tpslogin/link:
    get:
      operationId: getThirdPartyLoginLinks
      parameters:
        - name: code_challenge
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetThirdPartyLoginLinksResponse"
  /api/tpslogin/token/check:
    post:
      operationId: checkThirdPartyLoginToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThirdPartyTokenCheckRequest"
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThirdPartyTokenCheckResponse"
  /api/tpslogin/callback:
    post:
      operationId: oauthCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthCallbackRequest"
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OauthCallbackResponse"
  /api/tpslogin/callback/{alias}:
    get:
      operationId: oauthQueryCallback
      parameters:
        - name: alias
          in: path
          required: true
          schema: { type: string }
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OauthCallbackResponse"
  /api/login/setting:
    get:
      operationId: getLoginSetting
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLoginSettingResponse"
  /api/info/me:
    get:
      operationId: getUserInfo
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserInfoResponse"
  /api/tenant/config:
    get:
      operationId: getTenantConfig
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTenantConfigResponse"
  /api/setting:
    get:
      operationId: getVpnSetting
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetVpnSettingResponse"
  /api/vpn/list:
    get:
      operationId: getVpnLocations
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetVpnLocationsResponse"
  /vpn/conn:
    post:
      operationId: vpnConn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpnConnRequest"
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnConnEnvelope"
  /vpn/ping:
    get:
      operationId: vpnPing
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnPingResponse"
  /vpn/export:
    get:
      operationId: getVpnExports
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetVpnExportsResponse"
  /vpn/report:
    post:
      operationId: reportVpn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpnReportRequest"
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportVpnResponse"
  /api/security/report:
    post:
      operationId: reportSecurity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecurityReportRequest"
      responses:
        "200":
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportSecurityResponse"
components:
  schemas:
    JsonObject: &json_object
      type: object
      additionalProperties: true
    ActivateRequest:
      type: object
      required: [code]
      properties:
        code: { type: string }
    ActivateInfo:
      type: object
      properties:
        activate_host: { type: string }
        activate_backup_domain: { type: string }
        activate_enable_backup_domain: { type: boolean }
        tenant_name: { type: string }
        name: { type: string }
        zh_name: { type: string }
        en_name: { type: string }
        domain: { type: string }
        enable_self_signed: { type: boolean }
        self_signed_cert: { type: string }
        enable_public_key: { type: boolean }
        public_key: { type: string }
        raw: *json_object
    PasswordLoginRequest:
      type: object
      required: [login_scene, account_type, account, password]
      properties:
        login_scene: { type: string }
        account_type: { type: string }
        account: { type: string }
        password: { type: string }
    SendCodeRequest:
      type: object
      required: [login_scene, account_type, login_type, account]
      properties:
        login_scene: { type: string }
        account_type: { type: string }
        login_type: { type: string }
        account: { type: string }
    VerifyCodeRequest:
      type: object
      required: [login_scene, account_type, login_type, account, code]
      properties:
        login_scene: { type: string }
        account_type: { type: string }
        login_type: { type: string }
        account: { type: string }
        code: { type: string }
    VerifyMfaRequest:
      type: object
      required: [login_scene, mfa_type, account]
      properties:
        login_scene: { type: string }
        mfa_type: { type: string }
        account: { type: string }
        code: { type: string }
        password: { type: string }
    OAuthCallbackRequest:
      type: object
      required: [alias_key, code, state, code_verifier]
      properties:
        alias_key: { type: string }
        code: { type: string }
        state: { type: string }
        code_verifier: { type: string }
    ThirdPartyTokenCheckRequest:
      type: object
      required: [token]
      properties:
        token: { type: string }
    LoginResult:
      type: object
      properties:
        token: { type: string }
        vpn_token:
          type: string
        csrf-token:
          type: string
        uid: { type: string }
        need_mfa: { type: boolean }
        mfa_token: { type: string }
        raw: *json_object
    ThirdPartyLoginInfo:
      type: object
      properties:
        alias: { type: string }
        alias_key: { type: string }
        name: { type: string }
        link: { type: string }
        url: { type: string }
        login_url: { type: string }
        token: { type: string }
        state: { type: string }
        schema: { type: string }
        appid: { type: string }
        agentid: { type: string }
        scope: { type: string }
        notice: { type: string }
        is_custom: { type: boolean }
        full_title: { type: string }
        icon: { type: string }
        abbreviation: { type: string }
        raw: *json_object
    ThirdPartyTokenCheckResult:
      type: object
      properties:
        url: { type: string }
        token: { type: string }
        vpn_token:
          type: string
        csrf-token:
          type: string
        uid: { type: string }
        need_mfa: { type: boolean }
        mfa_token: { type: string }
        raw: *json_object
    LoginSetting:
      type: object
      properties:
        v1Login: { type: boolean }
        raw: *json_object
    TenantConfig:
      type: object
      properties:
        signingConfig:
          $ref: "#/components/schemas/SigningConfig"
        raw: *json_object
    SigningConfig:
      type: object
      properties:
        enable: { type: boolean }
        algorithms:
          type: array
          items: { type: string }
        rules:
          type: array
          items:
            $ref: "#/components/schemas/SigningRule"
    SigningRule:
      type: object
      properties:
        urls:
          type: array
          items: { type: string }
        enable_signing: { type: boolean }
        signing_input_params:
          type: integer
          format: int32
        max_time_desync:
          type: integer
          format: int32
    UserInfo:
      type: object
      properties:
        uid: { type: string }
        name: { type: string }
        email: { type: string }
        mobile: { type: string }
        raw: *json_object
    VpnSetting:
      type: object
      properties:
        enable: { type: boolean }
        mode: { type: string }
        export_id:
          type: integer
          format: int32
        raw: *json_object
    VpnLocation:
      type: object
      properties:
        name: { type: string }
        ip: { type: string }
        type: { type: string }
        isAuto: { type: boolean }
        currentDotBean:
          $ref: "#/components/schemas/VpnDot"
        vpnDotBeans:
          type: array
          items:
            $ref: "#/components/schemas/VpnDot"
        raw: *json_object
    VpnDot:
      type: object
      properties:
        id:
          type: integer
          format: int32
        apiIp: { type: string }
        api_port:
          type: integer
          format: int32
        ip: { type: string }
        vpn_port:
          type: integer
          format: int32
        protocol_mode:
          type: integer
          format: int32
        protocol_detect_config:
          $ref: "#/components/schemas/VpnProtocolDetectConfig"
        timeout:
          type: integer
          format: int32
        mode:
          type: integer
          format: int32
        type: { type: string }
        name: { type: string }
        display_name: { type: string }
        domain_name: { type: string }
        fastIp: { type: string }
        ip4Domain: { type: string }
        reconnect: { type: boolean }
        exclude: { type: boolean }
        dedicated: { type: boolean }
        backup_ips:
          type: array
          items: { type: string }
        ip_delay_routing_policy:
          $ref: "#/components/schemas/IpDelayRoutingPolicy"
        raw: *json_object
    IpDelayRoutingPolicy:
      type: object
      properties:
        is_operator: { type: boolean }
        policy_type:
          type: integer
          format: int32
    VpnProtocolDetectConfig:
      type: object
      properties:
        enable: { type: boolean }
        bad_network_count:
          type: integer
          format: int32
        refresh_timeout_count:
          type: integer
          format: int32
        tcp2udp_available_count:
          type: integer
          format: int32
        udp2tcp_timeout_count:
          type: integer
          format: int32
    VpnConnRequest:
      type: object
      required: [public_key, export_id]
      properties:
        mode: { type: string }
        public_key: { type: string }
        otp: { type: string }
        export_id:
          type: integer
          format: int32
        sign_token: { type: string }
        not_auto: { type: boolean }
    VpnReportRequest:
      type: object
      required: [type, ip, public_key, mode]
      properties:
        type: { type: string }
        ip: { type: string }
        public_key: { type: string }
        mode: { type: string }
    VpnExportInfo:
      type: object
      additionalProperties: true
    VpnExportListInfo:
      type: object
      properties:
        exports:
          type: array
          items:
            $ref: "#/components/schemas/VpnExportInfo"
    VpnConnResponse:
      type: object
      required: [ip, public_key, setting]
      properties:
        ip: { type: string }
        ipv6: { type: string }
        ip_mask:
          type: integer
          format: int32
        public_key: { type: string }
        preshared_key: { type: string }
        sign_token: { type: string }
        protocol_version: { type: string }
        setting:
          $ref: "#/components/schemas/VpnConnSetting"
        raw: *json_object
    VpnConnSetting:
      type: object
      required: [vpn_mtu]
      properties:
        vpn_mtu:
          type: integer
          format: int32
        vpn_dns: { type: string }
        vpn_dns_backup: { type: string }
        vpn_dns_domain_split:
          type: array
          items: { type: string }
        vpn_route_full:
          type: array
          items: { type: string }
        vpn_route_split:
          type: array
          items: { type: string }
        v6_route_full:
          type: array
          items: { type: string }
        v6_route_split:
          type: array
          items: { type: string }
        vpn_dynamic_domain_route_split: { type: string }
        v6_vpn_dynamic_domain_route_split: { type: string }
        vpn_wildcard_dynamic_domain_route_split: { type: string }
        suffix_wildcard_dynamic_domain_route_split: { type: string }
        dynamic_domain: { type: string }
        central_dns: { type: string }
        ip_nats: { type: string }
    SecurityReportItem:
      type: object
      required: [key, level]
      properties:
        key: { type: string }
        level:
          type: integer
          format: int32
        data: *json_object
    SecurityReportRequest:
      type: object
      required: [items]
      properties:
        status: { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/SecurityReportItem"
        raw: *json_object
    ActivateResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ActivateInfo"
    LoginByPasswordResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LoginResult"
    SendLoginCodeResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data: { type: string }
    VerifyLoginCodeResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LoginResult"
    VerifyMfaResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LoginResult"
    OauthCallbackResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LoginResult"
    ThirdPartyTokenCheckResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ThirdPartyTokenCheckResult"
    GetThirdPartyLoginLinksResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ThirdPartyLoginInfo"
    GetLoginSettingResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LoginSetting"
    GetUserInfoResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UserInfo"
    GetTenantConfigResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/TenantConfig"
    GetVpnSettingResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/VpnSetting"
    GetVpnLocationsResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/VpnDot"
    VpnConnEnvelope:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/VpnConnResponse"
    VpnPingResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data: *json_object
    GetVpnExportsResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/VpnExportListInfo"
    ReportVpnResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data: { type: string }
    ReportSecurityResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data: { type: string }
    ResponseBase:
      type: object
      required: [code]
      properties:
        code:
          type: integer
          format: int32
        message: { type: string }
        extra: *json_object
