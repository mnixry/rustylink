syntax = "proto3";

package rustylink.daemon.v1;

import "google/protobuf/timestamp.proto";
import "rustylink/daemon/v1/types.proto";

// ---------------------------------------------------------------------------
// Tunnel state — used by VpnService RPCs and WatchTunnel stream
// ---------------------------------------------------------------------------

message Tunnel {
  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_DISCONNECTED = 1;
    STATE_CONNECTING = 2;
    STATE_CONFIGURING = 3;
    STATE_CONNECTED = 4;
    STATE_RECONNECTING = 5;
    STATE_DISCONNECTING = 6;
    STATE_FAILED = 7;
  }

  State state = 1;
  VpnMode mode = 2;
  ProtocolMode protocol_mode = 3;
  int32 dot_id = 4;
  string dot_name = 5;
  string endpoint = 6;
  string assigned_ip = 7;
  google.protobuf.Timestamp connected_at = 8;
  google.protobuf.Timestamp last_handshake_at = 9;
  uint32 reconnect_attempts = 10;
  string error = 11;
  string outbound_interface = 12;
}

message GetTunnelRequest {}

message GetTunnelResponse {
  Tunnel tunnel = 1;
}

message ConnectTunnelRequest {
  VpnMode mode = 1;
  // Chosen location (dot) id. Unset = Auto: the daemon connects to the
  // lowest-latency reachable dot. The daemon pins this dot, reports it back,
  // and uses its id as the /vpn/conn export id, so the connected node always
  // matches the selection.
  optional int32 location_id = 2;
  optional string otp = 3;
  ProtocolMode protocol_mode = 4;
  bool reconnect = 5;
}

message ConnectTunnelResponse {
  Tunnel tunnel = 1;
}

message DisconnectTunnelRequest {}

message DisconnectTunnelResponse {
  Tunnel tunnel = 1;
}

message ListVpnLocationsRequest {}

message ListVpnLocationsResponse {
  repeated VpnLocation locations = 1;
}

message VpnLocation {
  int32 id = 1;
  string name = 2;
  string display_name = 3;
  VpnMode mode = 4;
  ProtocolMode protocol_mode = 5;
  int32 delay_ms = 6;
  string icon = 7;
  bool dedicated = 8;
  string tag = 9;
  // Protocols this dot accepts. UDP-only dots list [UDP], TCP-only dots list
  // [TCP], dual-mode dots list both. Clients use this to disable unsupported
  // `protocol_mode` choices in `ConnectTunnelRequest`.
  repeated ProtocolMode supported_protocols = 10;
}

// ---------------------------------------------------------------------------
// WatchTunnel — server-side streaming for VPN state changes
// ---------------------------------------------------------------------------

message WatchTunnelRequest {}

message WatchTunnelResponse {
  Tunnel tunnel = 1;
  google.protobuf.Timestamp updated_at = 2;
}

// ---------------------------------------------------------------------------
// ProbeDotLatency — client-side latency probing for dot selection.
// Latency is the round-trip of a TCP connect to the dot's API server, measured
// through the picked outbound interface (the same one the tunnel binds to).
// ---------------------------------------------------------------------------

message ProbeDotLatencyRequest {}

message ProbeDotLatencyResponse {
  repeated DotLatency results = 1;
}

message DotLatency {
  int32 dot_id = 1;
  string dot_name = 2;
  // Round-trip latency in ms to the dot's API server (0 when unreachable).
  int32 latency_ms = 3;
  bool reachable = 4;
}
