syntax = "proto3";

package rustylink.daemon.v1;

message ErrorInfo {
  int32 upstream_code = 1;
  string upstream_message = 2;
  ErrorKind kind = 3;
}

enum ErrorKind {
  ERROR_KIND_UNSPECIFIED = 0;
  ERROR_KIND_FORCE_LOGOUT = 1;
  ERROR_KIND_KNOCK_REQUIRED = 2;
  ERROR_KIND_SESSION_EXPIRED = 3;
  ERROR_KIND_WRONG_CREDENTIAL = 4;
  ERROR_KIND_NETWORK = 5;
  ERROR_KIND_TUNNEL = 6;
}
